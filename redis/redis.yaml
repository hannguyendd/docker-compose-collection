services:
  redis:
    image: redis/redis-stack:latest
    container_name: redis-stack
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
      - "${REDIS_INSIGHT_PORT:-8001}:8001"
    environment:
      REDIS_ARGS: ${REDIS_ARGS:---requirepass password}
    volumes:
      - redis_data:/data

volumes:
  redis_data:
